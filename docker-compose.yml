version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: crm-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./demo/demo # Change this to whatever your Spring Boot folder is named
    container_name: crm-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/crm_db
      - SPRING_AI_OLLAMA_BASE_URL=http://host.docker.internal:11434 # Connects to local Ollama!
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: crm-frontend
    ports:
      - "5173:80" # Maps localhost:5173 to Nginx port 80
    depends_on:
      - backend

volumes:
  pgdata: